# ===================================
# SNMP MIB Explorer Pro
# Docker Compose 一键部署
# ===================================
#
# 部署方式说明：
# ---------------
# 方式一：直接使用阿里云镜像（推荐国内用户）⭐
#   - 优点：无需本地构建，拉取速度快，开箱即用
#   - 默认配置：已配置好，直接执行 docker-compose up -d 即可
#   - 镜像地址：
#     * 后端: registry.cn-hangzhou.aliyuncs.com/snmp-mib/snmp-mib-explorer-pro-backend:latest
#     * 前端: registry.cn-hangzhou.aliyuncs.com/snmp-mib/snmp-mib-explorer-pro-frontend:latest
#
# 方式二：从本地源码构建镜像
#   - 适用场景：需要自定义修改代码、调试或学习源码
#   - 操作步骤：
#     1. 注释掉 backend 和 frontend 服务中的 image 行
#     2. 取消注释 build 配置部分
#     3. 执行 docker-compose up -d --build
#
# 快速开始：
# ---------
# 1. 复制环境变量文件：cp .env.example .env
# 2. 根据需要修改 .env 文件中的配置
# 3. 启动服务：docker-compose up -d
# 4. 访问应用：http://localhost:3000
#
# 常用命令：
# ---------
# - 查看日志：docker-compose logs -f
# - 停止服务：docker-compose down
# - 重启服务：docker-compose restart
# - 更新镜像：docker-compose pull && docker-compose up -d
# - 查看状态：docker-compose ps
#
# ===================================

version: '3.8'

services:
  # 后端服务
  backend:
    # 使用阿里云镜像（推荐国内用户）
    image: registry.cn-hangzhou.aliyuncs.com/snmp-mib/snmp-mib-explorer-pro-backend:latest
    # 如果需要从本地构建，取消下面的注释并注释掉上面的 image
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    container_name: snmp-mib-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${BACKEND_PORT:-8080}
      - GIN_MODE=${GIN_MODE:-release}
      - DATA_DIR=/app/data
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      # 持久化数据库和 MIB 文件（读写权限）
      - ${DATA_DIR:-./data}:/app/data
      # 映射宿主机根目录（只读），用于扫描宿主机上的 ZIP 文件
      - /:/host:ro
    networks:
      - snmp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${BACKEND_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    # 使用阿里云镜像（推荐国内用户）
    image: registry.cn-hangzhou.aliyuncs.com/snmp-mib/snmp-mib-explorer-pro-frontend:latest
    # 如果需要从本地构建，取消下面的注释并注释掉上面的 image
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    #   args:
    #     - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    container_name: snmp-mib-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - snmp-network

networks:
  snmp-network:
    driver: bridge
